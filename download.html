<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script>
        const iosUrl = "https://apps.apple.com/us/app/signature-finder/id6740019528";
        const androidUrl = "https://play.google.com/store/apps/details?id=app.signaturefinder";
        const fallbackUrl = "https://signaturefinder.app";

        const ua = navigator.userAgent || navigator.vendor || window.opera;

        if (/iPad|iPhone|iPod/.test(ua)) {
            window.location.replace(iosUrl);
        } else if (/android/i.test(ua)) {
            window.location.replace(androidUrl);
        } else {
            window.location.replace(fallbackUrl);
        }
    </script>
</head>
<body>
    Redirecting...
</body>
</html>
